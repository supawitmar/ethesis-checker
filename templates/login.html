<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เข้าสู่ระบบ — E-Thesis Staff Checker</title>
  <style>
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:20px;
      font-family:"Noto Sans Thai",Tahoma,Arial,sans-serif; background:#eef2f7; color:#243447; }
    .login { width:100%; max-width:420px; background:#fff; border-radius:14px;
      box-shadow:0 8px 30px rgba(30,50,75,.13); padding:34px; }
    h1 { margin:0 0 6px; color:#1a3a5c; font-size:1.45rem; }
    .sub { color:#687688; margin-bottom:24px; }
    label { display:block; font-weight:600; margin-bottom:7px; }
    input { width:100%; padding:11px 12px; border:1px solid #cbd3dd; border-radius:8px;
      font:inherit; margin-bottom:16px; }
    input:focus { outline:2px solid #a9c8e7; border-color:#27568a; }
    button { width:100%; padding:11px; background:#1a3a5c; color:#fff; border:0;
      border-radius:8px; font:inherit; font-weight:700; cursor:pointer; }
    .error { background:#fff1f1; color:#a12626; padding:10px 12px; border-radius:7px;
      margin-bottom:16px; }
    .warning { background:#fff7df; color:#785b00; padding:10px 12px; border-radius:7px;
      margin-bottom:16px; }
  </style>
</head>
<body>
  <main class="login">
    <h1>E-Thesis Staff Checker</h1>
    <div class="sub">กรอกรหัสผ่านเพื่อเข้าใช้งานระบบ</div>
    {% if not configured %}<div class="warning">ผู้ดูแลระบบยังไม่ได้ตั้งค่า APP_PASSWORD</div>{% endif %}
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form action="/login" method="post">
      <input type="hidden" name="next" value="{{ next_path }}">
      <label for="password">รหัสผ่าน</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required autofocus>
      <button type="submit" {% if not configured %}disabled{% endif %}>เข้าสู่ระบบ</button>
    </form>
  </main>
</body>
</html>
